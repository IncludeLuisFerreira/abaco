services:
  database:
    image: postgres:16
    container_name: sga_database
    restart: always
    environment:
      POSTGRES_DB: sga_abacos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/database-schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sga_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sga_backend
    restart: always
    ports:
      - "3333:3333"
    environment:
      PORT: 3333
      DATABASE_URL: postgres://postgres:postgres@database:5432/sga_abacos
      JWT_SECRET: development_secret_change_me
      NODE_ENV: development
    depends_on:
      - database
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - sga_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sga_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3333
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - sga_network

volumes:
  postgres_data:

networks:
  sga_network:
    driver: bridge